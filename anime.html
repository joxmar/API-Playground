<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen p-6 font-sans">

  <header class="mb-10 flex justify-center">
    <form id="search-form" class="relative w-full max-w-xl">
      <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </div>
      <input id="search-field" type="search"
        class="block w-full p-4 pl-10 text-sm text-white border border-gray-700 rounded-lg bg-gray-800 focus:ring-blue-500 focus:border-blue-500 placeholder-gray-400"
        placeholder="Search for anime..." required>
      <button id="search-button" type="submit"
        class="text-white absolute right-2.5 bottom-2.5 bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2">Search</button>
    </form>
  </header>

  <main class="container mx-auto">
    <div id="anime-results" class="relative grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <!-- loading animation -->

      <div role="status" class="absolute top-0 left-1/2 transform -translate-x-1/2">
        <svg aria-hidden="true" class="w-8 h-8 text-neutral-tertiary animate-spin fill-brand" viewBox="0 0 100 101"
          fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
            fill="currentColor" />
          <path
            d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
            fill="#ff0000" />
        </svg>
        <span class="sr-only">Loading...</span>
      </div>

    </div>
  </main>

  <script>
    let apiData;
    // console.log('loading...');
    async function fetchData(anime = '') {
      try {
        const response = await fetch(`https://api.jikan.moe/v4/anime?q=${anime}`);
        const data = await response.json();
        apiData = data.data;
        init(); // we start our shit here, otherwise data is still loading.
      }
      catch (error) {
        console.error(error);
      }
    }
    fetchData();

    function init() {
      // console.clear();
      // console.table(apiData);

      /*
      Initial population
      */
      const animeResults = document.getElementById('anime-results');
      const fragment = document.createDocumentFragment();

      apiData.forEach(anime => {
        const temp = document.createElement('template');
        temp.innerHTML = `
      <article
        class="bg-gray-800 rounded-xl overflow-hidden shadow-lg transform hover:scale-105 transition duration-300 border border-gray-700">
        <div class="relative h-64 overflow-hidden">
          <img class="w-full h-full object-cover" src="${anime.images.jpg.image_url || 'https://placehold.co/400x600/1a1a1a/cccccc?text=Anime+Image'}"
            alt="Anime Placeholder">
          <div class="absolute top-0 right-0 bg-blue-600 text-white text-xs font-bold px-3 py-1 m-2 rounded">
            ${anime.season || 'unknown'}
          </div>
        </div>
        <div class="p-5">
          <h2 class="text-xl font-bold mb-0 text-white">${anime.title_english || anime.title}</h2>
          <p class="text-sm text-color-gray-200 mb-2 italic">${anime.title}</p>
          <div class="flex items-center text-gray-400 text-sm">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            <span>${anime.year || 'unknown'}</span>
          </div>
        </div>
      </article>
      `.trim();
        fragment.appendChild(temp.content);
      });
      animeResults.innerHTML = '';
      animeResults.appendChild(fragment);
    }

    const searchInput = document.getElementById('search-field');
    const searchForm = document.getElementById('search-form');


    searchForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const query = searchInput.value.toLowerCase();
      fetchData(query);
    });

  </script>
</body>

</html>
